spring.application.name=coursera

# DEBUG logs for only our own package (everything else stays at default INFO)
logging.level.com.sm.coursera=debug
#logging.level.org.springframework=info #this is default

spring.profiles.active=dev
currency-service.url=https://api.example.com/currency
currency-service.username=changeme
currency-service.key=changeme



management.endpoints.web.exposure.include=*

server.port = 8080

# JSP view resolver: a returned view name "sayHello" -> /WEB-INF/jsp/sayHello.jsp
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp