spring.application.name=coursera

# DEBUG logs for only our own package (everything else stays at default INFO)
logging.level.com.sm.coursera=debug
#logging.level.org.springframework=info #this is default

spring.profiles.active=dev
currency-service.url=https://api.example.com/currency
currency-service.username=changeme
currency-service.key=changeme



management.endpoints.web.exposure.include=*

server.port = 8080

# JSP view resolver: a returned view name "sayHello" -> /WEB-INF/jsp/sayHello.jsp
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# --- H2 in-memory database ---
# A fixed URL so the schema/data survive across the app's own connections (but
# still vanish on shutdown, since it's in-memory).
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Web console for browsing the DB at http://localhost:8080/h2-console
# (use JDBC URL jdbc:h2:mem:tododb, user "sa", empty password). Dev-only.
spring.h2.console.enabled=true

# --- JPA / Hibernate ---
# create-drop: Hibernate builds the schema from the @Entity classes at startup
# and drops it at shutdown — fine for an in-memory dev database.
spring.jpa.hibernate.ddl-auto=create-drop
# Log the SQL Hibernate runs (nicely formatted) — handy while learning.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Run data.sql AFTER Hibernate has created the schema (otherwise the inserts
# would run first and fail because the table doesn't exist yet).
spring.jpa.defer-datasource-initialization=true